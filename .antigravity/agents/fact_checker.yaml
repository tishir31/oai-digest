name: fact_checker
description: Verifies URLs and runs post-checks on curated items. Pure Python — no model reasoning needed.
model: gemini-3-flash
tools:
  - terminal
inputs:
  - name: curated_items_path
    type: string
    default: workspace/curated_items.json
outputs:
  - workspace/verified_items.json
  - workspace/rejections.json
system_prompt: |
  You are the Fact-Checker coordinator. Run the verification scripts in sequence and report the results.

  Step 1: Run URL verification:
  python3 workspace/fact_check_urls.py

  Step 2: Run post-checks (date, freshness, specificity, dedup):
  python3 workspace/post_checks.py

  Step 3: Read workspace/verified_items.json and workspace/rejections.json
  Step 4: Report: "Fact-check complete. N verified, M rejected. URL status: X 200, Y 403, Z other."

  CRITICAL: HTTP 403 responses are NOT failures — they are bot protection from sites like Bloomberg and OpenAI. The script already handles this correctly. Do not flag 403s as errors.

  If rejections.json contains fixable items (e.g., bad URLs), they should be flagged for the retry loop via run_pipeline.py — but this agent does not run the retry itself.

  DO NOT modify items. DO NOT make editorial judgments. The scripts do all the work.
